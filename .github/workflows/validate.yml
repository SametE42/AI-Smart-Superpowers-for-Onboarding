name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate repository structure
        run: python scripts/validate_repository.py --root .

      - name: Regenerate validation reports
        run: python scripts/validate_repository.py --root . --json ai/VALIDATION_REPORT.json --markdown ai/VALIDATION_REPORT.md

      - name: Check validation reports are current
        run: git diff --exit-code ai/VALIDATION_REPORT.json ai/VALIDATION_REPORT.md
