name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate repository structure
        run: python scripts/validate_repository.py --root .

      - name: Validate language support
        run: python scripts/check_language_support.py --root .

      - name: Validate standard docs contract
        run: python scripts/check_standard_docs.py --root .

      - name: Installer dry-run minimal
        run: python scripts/install_ai_onboarding.py --mode minimal --language en --structure canonical --target /tmp/ai-onboarding-min --dry-run

      - name: Installer dry-run standard
        run: python scripts/install_ai_onboarding.py --mode standard --language en --structure canonical --target /tmp/ai-onboarding-standard --dry-run

      - name: Installer dry-run enterprise
        run: python scripts/install_ai_onboarding.py --mode enterprise --language en --structure canonical --target /tmp/ai-onboarding-enterprise --dry-run

      - name: Installer dry-run German localized
        run: python scripts/install_ai_onboarding.py --mode standard --language de --structure localized --target /tmp/ai-onboarding-de --dry-run

      - name: Regenerate validation reports
        run: python scripts/validate_repository.py --root . --json ai/VALIDATION_REPORT.json --markdown ai/VALIDATION_REPORT.md

      - name: Check validation reports are current
        run: git diff --exit-code ai/VALIDATION_REPORT.json ai/VALIDATION_REPORT.md
